eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: api-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/**